services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_job_copilot
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://copilot:copilot@postgres:5432/ai_job_copilot
      JWT_SECRET: change-me
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://copilot:copilot@postgres:5432/ai_job_copilot
      JWT_SECRET: change-me
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
