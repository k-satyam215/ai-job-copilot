<!DOCTYPE html>
<html>
<head>
  <title>AI Job Copilot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      padding: 18px;
      font-family: -apple-system, Inter, Arial, sans-serif;
      color: #eef2ff;
      background: #070d1a;
      font-size: 13px;
    }
    .brand {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .brand-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #4f8aff, #7c5cfc);
      display: grid; place-items: center;
      font-size: 16px;
    }
    .brand-name { font-size: 15px; font-weight: 700; }
    .brand-sub  { font-size: 10px; color: #4f5a72; margin-top: 1px; }

    p { color: #8b95b0; font-size: 12px; line-height: 1.55; margin-bottom: 12px; }

    label { display: block; font-size: 11px; font-weight: 600; color: #8b95b0; margin-bottom: 5px; letter-spacing: 0.04em; text-transform: uppercase; }

    .input-row { display: flex; gap: 6px; margin-bottom: 10px; }
    input {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      color: #eef2ff;
      background: rgba(255,255,255,0.05);
      font-size: 12px;
      outline: none;
    }
    input:focus { border-color: #4f8aff; }

    .btn {
      padding: 9px 14px;
      border: 0;
      border-radius: 7px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #4f8aff; color: #fff; }
    .btn-ghost   { background: rgba(255,255,255,0.07); color: #eef2ff; border: 1px solid rgba(255,255,255,0.1); }

    .save-row { display: flex; gap: 6px; }
    .save-row .btn { flex: 1; }

    #status { min-height: 22px; margin-top: 10px; font-size: 12px; color: #22d3a0; }

    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }

    .how {
      font-size: 11px;
      color: #4f5a72;
      line-height: 1.6;
    }
    .how ol { padding-left: 14px; }
    .how a  { color: #4f8aff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-icon">🤖</div>
    <div>
      <div class="brand-name">AI Job Copilot</div>
      <div class="brand-sub">CAREER AGENT</div>
    </div>
  </div>

  <p>Paste your JWT token from the dashboard to connect this extension to your account.</p>

  <label>JWT Token</label>
  <div class="input-row">
    <input id="token" type="password" placeholder="eyJhbGci…" />
    <button id="copy" class="btn btn-ghost">Copy</button>
  </div>

  <div class="save-row">
    <button id="save" class="btn btn-primary">Save Token</button>
  </div>

  <div id="status"></div>

  <div class="divider"></div>

  <div class="how">
    <strong style="color:#8b95b0; font-size:11px;">HOW TO GET YOUR TOKEN</strong>
    <ol style="margin-top:6px">
      <li>Open <a href="http://localhost:3000" target="_blank">localhost:3000</a></li>
      <li>Sign in to your account</li>
      <li>The token is shown on the homepage after login</li>
      <li>Copy &amp; paste it here, then click Save</li>
    </ol>
  </div>

  <script src="popup.js"></script>
</body>
</html>
